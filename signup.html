<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1B365D" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="img/icon-192.png" />
  <title>Sign up · ESP First Five</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Roboto:wght@300;400;500;700&display=swap" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<main class="signin-stage" style="padding: 24px 32px 48px;">
  <div class="crest" style="margin-bottom: 16px;">FF</div>
  <h1 style="font-size: 28px; margin-bottom: 4px;">Welcome to First Five</h1>
  <div class="tag" style="margin-bottom: 22px;">Tell us a little about yourself</div>

  <form id="signup-form" novalidate>
    <div class="form-field">
      <label for="name">Full name</label>
      <input type="text" id="name" autocomplete="name" placeholder="e.g. Marisol Vega" required />
    </div>
    <div class="form-field">
      <label for="email">Email address</label>
      <input type="email" id="email" autocomplete="email" placeholder="you@example.org" required />
    </div>
    <div class="form-field">
      <label for="chapter">Chapter</label>
      <input type="text" id="chapter" placeholder="e.g. Texas Alpha" required />
    </div>
    <div class="form-field">
      <label for="year">Years in ESP</label>
      <input type="text" id="year" inputmode="numeric" pattern="[0-9]*" placeholder="1, 2, 3, 4, or 5" required />
    </div>
    <div class="form-field">
      <label for="headline">I'd love to talk to someone about… (optional)</label>
      <input type="text" id="headline" placeholder="e.g. 4-H program design, climate-smart agriculture" />
    </div>

    <button class="btn primary" type="submit" id="signup-btn">Create my account</button>

    <p class="helper" style="margin-top: 18px;">
      <a href="index.html" style="color: var(--esp-gold); text-decoration: underline;">← Back to sign in</a>
    </p>
    <p class="helper" style="opacity: .75; margin-top: 12px; font-size: 11px;">
      By signing up you agree to ESP's Code of Conduct. We collect only what you enter here. Your data lives in the ESP First Five Google Sheet, accessible only to ESP staff.
    </p>
  </form>
</main>

<script src="js/config.js"></script>
<script src="js/data.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
  // If already signed in, redirect to dashboard.
  if (FF.currentUserEmail()) location.href = "dashboard.html";

  // If self-signup is disabled, send them back.
  if (window.FF_CONFIG && window.FF_CONFIG.allowSelfSignup === false) {
    location.href = "index.html";
  }

  document.getElementById("signup-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = document.getElementById("signup-btn");

    const form = {
      name:     document.getElementById("name").value.trim(),
      email:    document.getElementById("email").value.trim(),
      chapter:  document.getElementById("chapter").value.trim(),
      year:     document.getElementById("year").value.trim(),
      headline: document.getElementById("headline").value.trim(),
    };

    if (!form.name || !form.email || !form.chapter || !form.year) {
      toast("Please fill in name, email, chapter, and years.", "error");
      return;
    }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) {
      toast("That email doesn't look right.", "error");
      return;
    }

    btn.disabled = true; btn.textContent = "Creating account…";
    const result = await FF.signUp(form);
    btn.disabled = false; btn.textContent = "Create my account";

    if (!result.ok) {
      toast(result.message, "error");
      return;
    }
    toast("Welcome aboard!", "success");
    setTimeout(() => location.href = "dashboard.html", 700);
  });
</script>
</body>
</html>
