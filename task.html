<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1B365D" />
  <link rel="manifest" href="manifest.json" />
  <title>Task · ESP First Five</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Roboto:wght@300;400;500;700&display=swap" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<div class="app">
  <header class="task-hero">
    <button class="back-btn" onclick="history.back()">← Back</button>
    <div class="pts-big" id="task-pts">0</div>
    <h1 id="task-name">Loading…</h1>
    <div class="where" id="task-where">—</div>
  </header>

  <main class="task-body">
    <p class="description" id="task-desc"></p>

    <div class="mission-tie">
      <strong style="color:var(--esp-blue); font-style: normal;">Why this matters:</strong>
      <span id="task-mission"></span>
    </div>

    <section class="proof-section" id="proof-section"></section>
  </main>
</div>

<script src="js/config.js"></script>
<script src="js/data.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/proof.js"></script>
<script>
  FF.requireAuth();

  // Get task ID from URL: task.html?id=T01
  const params = new URLSearchParams(location.search);
  const id = params.get("id");
  const task = FF_TASKS.find(t => t.id === id);

  if (!task) {
    document.body.innerHTML = `
      <div style="padding:40px; text-align:center;">
        <h2>Task not found</h2>
        <p><a href="tasks.html">Back to tasks</a></p>
      </div>`;
    throw new Error("task missing");
  }

  // Render hero
  $("#task-name").textContent = task.name;
  $("#task-where").textContent = task.where;
  $("#task-mission").textContent = task.mission;
  $("#task-desc").textContent = task.description;
  $("#task-pts").innerHTML = `${task.points}<small style="font-size:13px; opacity:.7;">pts</small>`;
  document.title = task.name + " · ESP First Five";

  // Render proof section
  const proof = $("#proof-section");
  if (FF.isCompleted(task.id)) {
    const info = FF.completedMap()[task.id];
    proof.innerHTML = `
      <div class="completed-state">
        <span class="check">✓</span>
        Task complete · ${formatTime(info.when)}
      </div>
      <p style="margin-top: 12px; font-size: 13px; color: var(--muted); text-align: center;">
        Method: ${info.proofKind}${info.validator ? " · validated by " + info.validator : ""}
      </p>
    `;
  } else if (task.proof === "Signature") {
    mountSignaturePad(proof, task);
  } else if (task.proof === "Photo") {
    mountPhotoUploader(proof, task);
  } else if (task.proof === "Quiz") {
    mountQuiz(proof, task);
  }
</script>
</body>
</html>
